<!DOCTYPE html>
<html lang="fr"><head>

<title>Questionnaires DPL — Les Makaras</title>
<style>
:root{
  --bg:#eef1ec; --surface:#ffffff; --surface-2:#f7f9f5;
  --ink:#27302a; --ink-soft:#5a655b; --line:#dde3da;
  --accent:#5b8a6f; --accent-d:#3f6b53; --accent-soft:#e6f0e8;
  --warn:#b5603f; --warn-soft:#f7ebe5; --radius:12px; --maxw:760px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px;line-height:1.65;}
.bar{position:sticky;top:0;z-index:20;background:rgba(247,249,245,.92);
  backdrop-filter:blur(6px);border-bottom:1px solid var(--line);}
.bar-in{max-width:var(--maxw);margin:0 auto;padding:10px 20px;}
.brand{font-size:13px;letter-spacing:.03em;color:var(--ink-soft);font-weight:600;text-transform:uppercase;}
.prog{margin-top:8px;display:flex;align-items:center;gap:12px;}
.prog .track{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden;}
.prog .fill{height:100%;background:var(--accent);width:0;transition:width .35s ease;}
.prog .lab{font-size:13px;color:var(--ink-soft);white-space:nowrap;}
main{max-width:var(--maxw);margin:0 auto;padding:28px 20px 120px;}
h1{font-size:30px;line-height:1.2;margin:0 0 14px;font-weight:700;letter-spacing:-.01em;}
h2{font-size:23px;margin:0 0 4px;font-weight:700;letter-spacing:-.01em;}
.sub{color:var(--ink-soft);margin:0 0 18px;}
p{margin:0 0 14px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;margin:0 0 18px;}
.note{background:var(--surface-2);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:10px;padding:14px 16px;color:var(--ink-soft);font-size:15px;margin:0 0 18px;}
.field{margin:0 0 16px;}
.field label{display:block;font-weight:600;margin:0 0 6px;font-size:15px;}
.field input{width:100%;font:inherit;padding:11px 13px;border:1px solid var(--line);
  border-radius:10px;background:var(--surface);color:var(--ink);}
.field input:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
.q{padding:18px 0;border-top:1px solid var(--line);}
.q:first-of-type{border-top:none;}
.q.miss{background:var(--warn-soft);border-radius:10px;padding:18px 16px;margin:0 -16px;border-top:none;}
.q .qt{display:flex;gap:10px;margin:0 0 12px;}
.q .qn{flex:none;width:30px;height:30px;border-radius:8px;background:var(--accent-soft);
  color:var(--accent-d);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center;}
.q .qx{padding-top:3px;}
.opts{display:flex;flex-direction:column;gap:8px;margin-left:40px;}
.opt{display:flex;align-items:center;gap:11px;min-height:46px;padding:9px 14px;
  border:1px solid var(--line);border-radius:10px;background:var(--surface);cursor:pointer;
  transition:background .12s,border-color .12s;font-size:15.5px;}
.opt:hover{background:var(--surface-2);}
.opt .dot{flex:none;width:20px;height:20px;border-radius:50%;border:2px solid #c2cabf;}
.opt.sel{background:var(--accent-soft);border-color:var(--accent);}
.opt.sel .dot{border-color:var(--accent-d);background:radial-gradient(circle at center,var(--accent-d) 0 6px,transparent 7px);}
.opt input{position:absolute;opacity:0;width:0;height:0;}
.opt:focus-within{outline:2px solid var(--accent);outline-offset:2px;}
.navbar{position:fixed;bottom:0;left:0;right:0;background:rgba(247,249,245,.95);
  backdrop-filter:blur(6px);border-top:1px solid var(--line);}
.navbar-in{max-width:var(--maxw);margin:0 auto;padding:12px 20px;display:flex;justify-content:space-between;gap:12px;align-items:center;}
button{font:inherit;}
.btn{border:1px solid var(--accent);background:var(--accent);color:#fff;font-weight:600;
  padding:12px 22px;border-radius:10px;cursor:pointer;transition:background .12s;}
.btn:hover{background:var(--accent-d);border-color:var(--accent-d);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn.ghost{background:transparent;color:var(--accent-d);}
.btn.ghost:hover{background:var(--accent-soft);}
.btn:focus-visible{outline:2px solid var(--accent-d);outline-offset:2px;}
.banner{background:var(--warn-soft);border:1px solid var(--warn);color:var(--warn);
  border-radius:10px;padding:12px 16px;margin:0 0 18px;font-size:15px;font-weight:500;}
.hidden{display:none;}
.code{width:100%;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;
  padding:12px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);
  color:var(--ink-soft);min-height:120px;word-break:break-all;resize:vertical;}
.muted{color:var(--ink-soft);font-size:14px;}
a{color:var(--accent-d);}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head><body>

<script>
const Q = [{"id": "RAADS", "title": "Questionnaire 1 — RAADS-R", "subtitle": "Votre façon de penser et de réagir, de l'enfance à aujourd'hui", "instruction": "Pour chaque phrase, cochez une seule réponse, celle qui vous correspond le mieux. Répondez selon votre propre opinion, sans penser à ce que les autres attendraient de vous.", "opts": ["Vrai maintenant et quand j'avais moins de 16 ans", "Vrai seulement maintenant", "Vrai seulement quand j'avais moins de 16 ans", "Jamais vrai"], "items": [{"n": 1, "text": "Je suis une personne compatissante"}, {"n": 2, "text": "J'utilise souvent des mots et des phrases entendus dans des films ou à la télévision dans les conversations"}, {"n": 3, "text": "Je suis souvent surpris lorsque les autres me disent que j'ai été impoli."}, {"n": 4, "text": "Parfois, je parle trop fort ou trop doucement et je ne m'en aperçois pas."}, {"n": 5, "text": "J'ai souvent des difficultés à savoir comment me comporter en société."}, {"n": 6, "text": "Je peux \"me mettre dans la peau de quelqu'un d'autre\"."}, {"n": 7, "text": "J'ai du mal à comprendre le sens de certaines phrases comme \"je tiens à toi comme à la prunelle de mes yeux\"."}, {"n": 8, "text": "J'aime seulement parler aux gens qui partagent mes centres d'intérêt."}, {"n": 9, "text": "Je fais plus attention aux détails qu'à l'idée générale."}, {"n": 10, "text": "Je suis sensible à l'effet produit par un aliment dans ma bouche. Ceci est plus important que son goût."}, {"n": 11, "text": "Mes meilleurs amis ou ma famille me manquent quand nous sommes séparés depuis longtemps."}, {"n": 12, "text": "Quelquefois, je vexe les autres en disant ce que je pense, sans le faire exprès."}, {"n": 13, "text": "J'aime seulement penser et parler des choses qui m'intéressent."}, {"n": 14, "text": "Je préfère aller manger dans un restaurant tout seul plutôt qu'avec quelqu'un que je connais."}, {"n": 15, "text": "Je n'arrive pas à imaginer comment ce serait d'être quelqu'un d'autre."}, {"n": 16, "text": "On m'a déjà dit que j'étais maladroit ou que je manquais de coordination."}, {"n": 17, "text": "Les autres me trouvent étrange ou différent."}, {"n": 18, "text": "Je comprends lorsque des amis ont besoin d'être réconfortés."}, {"n": 19, "text": "Je suis très sensible au contact de mes vêtements lorsque je les touche. Leur texture est plus importante pour moi que leur look."}, {"n": 20, "text": "J'aime copier la manière dont certaines personnes parlent et agissent. Cela m'aide à me sentir plus normal."}, {"n": 21, "text": "Cela peut être très intimidant pour moi de parler à plus d'une personne en même temps."}, {"n": 22, "text": "Je dois adopter un comportement \"normal\" pour plaire aux autres et pour qu'ils m'apprécient."}, {"n": 23, "text": "Rencontrer de nouvelles personnes est habituellement facile pour moi."}, {"n": 24, "text": "Je suis déstabilisé lorsque quelqu'un m'interrompt alors que je parle de quelque chose qui m'intéresse beaucoup."}, {"n": 25, "text": "Il m'est difficile de percevoir les sentiments des autres lors d'une conversation."}, {"n": 26, "text": "J'aime avoir une conversation avec plusieurs personnes, par exemple lors d'un dîner, à l'école ou au travail."}, {"n": 27, "text": "Je prends les choses trop au premier degré, ainsi je passe à côté de ce que les gens essaient de me dire."}, {"n": 28, "text": "C'est très difficile pour moi de comprendre lorsque quelqu'un est gêné ou jaloux."}, {"n": 29, "text": "Certaines textures ordinaires qui ne posent aucun problème aux autres sont pour moi insupportables lorsqu'elles sont au contact de ma peau."}, {"n": 30, "text": "Je suis très contrarié lorsqu'on m'empêche de faire les choses à ma façon."}, {"n": 31, "text": "Je n'ai jamais désiré ou eu besoin de ce que les autres personnes appellent une \"relation intime\"."}, {"n": 32, "text": "C'est difficile pour moi de commencer et d'arrêter une conversation. J'ai besoin d'aller jusqu'au bout de mon propos."}, {"n": 33, "text": "Je parle avec un rythme de voix normal."}, {"n": 34, "text": "Je peux sans transition être très sensible ou pas du tout sensible au même son, à la même couleur ou à la même texture."}, {"n": 35, "text": "La phrase \"je t'ai dans la peau\" me met mal à l'aise."}, {"n": 36, "text": "Quelquefois, la sonorité d'un mot ou un bruit aigu peut me faire mal aux oreilles."}, {"n": 37, "text": "On me considère comme une personne très compréhensive."}, {"n": 38, "text": "Je ne peux pas m'identifier à un personnage dans un film, et je ne peux pas ressentir ce qu'il ressent."}, {"n": 39, "text": "Je ne peux pas dire si quelqu'un est en train de me draguer."}, {"n": 40, "text": "Je peux me représenter avec précisions les détails qui m'intéressent."}, {"n": 41, "text": "Je fais des listes de choses qui m'intéressent, même si elles n'ont pas d'utilité pratique (par exemple statistiques sportives, horaires de train, dates du calendrier, faits historiques, etc.)"}, {"n": 42, "text": "Quand je me sens dépassé par des stimulations sensorielles, je dois m'isoler pour y échapper."}, {"n": 43, "text": "J'aime parler de choses et d'autres avec mes amis."}, {"n": 44, "text": "Je ne peux pas dire si quelqu'un est intéressé ou ennuyé par ce que je dis."}, {"n": 45, "text": "Lorsque quelqu'un est en train de parler, il peut m'être très difficile de lire sur son visage, de comprendre les mouvements de ses mains ou de son corps."}, {"n": 46, "text": "Je peux ressentir à différents moments la même chose très différemment (comme des vêtements ou la température)."}, {"n": 47, "text": "Je me sens très à l'aise lors d'un rendez-vous amoureux ou lorsque je me trouve en société."}, {"n": 48, "text": "J'essaie d'être aussi aidant que possible lorsque les autres me parlent de leurs problèmes personnels."}, {"n": 49, "text": "On m'a dit que j'avais une voix particulière (par exemple plate, monotone, enfantine ou aigüe)"}, {"n": 50, "text": "Quelquefois une idée ou un sujet reste bloqué dans mon esprit et je dois en parler, même si cela n'intéresse personne."}, {"n": 51, "text": "Je fais certaines choses avec mes mains de façon répétée (comme un battement d'ailes, faire tournoyer un bâton ou une ficelle, agiter des choses devant mes yeux)."}, {"n": 52, "text": "Je n'ai jamais été intéressé par ce que la plupart des gens que je connais considèrent comme intéressant."}, {"n": 53, "text": "On me considère comme une personne compatissante."}, {"n": 54, "text": "Pour m'entendre avec les autres, je suis un ensemble de règles spécifiques qui m'aident à paraître normal."}, {"n": 55, "text": "C'est très difficile pour moi de travailler et d'évoluer dans un groupe."}, {"n": 56, "text": "Lorsque je parle à quelqu'un, il m'est difficile de changer de sujet. Si l'autre personne le fait, je peux être bouleversé et confus."}, {"n": 57, "text": "Quelquefois, je dois couvrir mes oreilles pour arrêter les bruits douloureux (comme un aspirateur ou des gens qui parlent trop ou trop fort)."}, {"n": 58, "text": "Je peux discuter et avoir des conversations superficielles."}, {"n": 59, "text": "Quelquefois, des choses qui devraient être douloureuses ne me font pas mal (par exemple, lorsque je me blesse ou lorsque je me brûle la main sur un poêle)."}, {"n": 60, "text": "Quand je parle à quelqu'un, j'ai des difficultés à savoir si c'est mon tour de parler ou d'écouter."}, {"n": 61, "text": "Je suis considéré comme un solitaire par ceux qui me connaissent le mieux."}, {"n": 62, "text": "Je parle habituellement avec un ton de voix normal."}, {"n": 63, "text": "J'aime que les choses se déroulent toujours de la même manière, jour après jour, et même les petits changements dans mes routines me perturbent."}, {"n": 64, "text": "Comment se faire des amis et s'intégrer socialement est un mystère pour moi."}, {"n": 65, "text": "Cela me calme de tourner en rond ou de me balancer sur une chaise lorsque je me sens stressé."}, {"n": 66, "text": "La phrase \" il a le cœur sur la main\" n'a pas de sens pour moi."}, {"n": 67, "text": "Si je suis dans un endroit où il y a beaucoup d'odeurs, de matières à toucher, de bruits ou de lumières intenses, je me sens anxieux ou effrayé."}, {"n": 68, "text": "Je sais faire la différence lorsque quelqu'un dit une chose mais veut en dire une autre."}, {"n": 69, "text": "J'aime être seul autant que possible."}, {"n": 70, "text": "Je garde mes pensées empilées dans ma mémoire comme dans un classeur et je prends celles dont j'ai besoin en sélectionnant dans la pile (ou avec une méthode similaire)."}, {"n": 71, "text": "Le même son peut paraître quelquefois très fort ou très doux alors que je sais qu'il n'a pas changé."}, {"n": 72, "text": "J'aime passer du temps à manger et parler avec ma famille et mes amis."}, {"n": 73, "text": "Je ne supporte pas les choses que je n'aime pas (comme des odeurs, des matières, des sons ou des couleurs)."}, {"n": 74, "text": "Je n'aime pas être tenu ou étreint."}, {"n": 75, "text": "Lorsque je vais quelque part, je dois suivre un parcours familier sinon je peux devenir très confus et perturbé."}, {"n": 76, "text": "C'est difficile de comprendre ce que les autres personnes attendent de moi."}, {"n": 77, "text": "J'aime avoir des amis proches."}, {"n": 78, "text": "On me dit que je donne trop de détails."}, {"n": 79, "text": "On me dit souvent que je pose des questions embarrassantes."}, {"n": 80, "text": "J'ai tendance à souligner les erreurs des autres."}]}, {"id": "SQ", "title": "Questionnaire 2 — SQ-R", "subtitle": "Votre intérêt pour les systèmes, les règles et l'organisation", "instruction": "Lisez chaque affirmation et cochez la case correspondant le mieux à votre degré d'accord.", "opts": ["Tout à fait d'accord", "Plutôt d'accord", "Plutôt pas d'accord", "Pas du tout d'accord"], "items": [{"n": 1, "text": "Je trouve cela très facile d’utiliser les tableaux horaires des trains même s’ils impliquent plusieurs correspondances."}, {"n": 2, "text": "J’aime les magasins de musique ou les librairies parce qu’ils sont clairement organisés."}, {"n": 3, "text": "Je n’aimerais pas organiser des événements comme des soirées de collecte, des fêtes, des conférences, …"}, {"n": 4, "text": "Quand je lis quelque chose, je remarque toujours si c’est grammaticalement correct."}, {"n": 5, "text": "Je me surprends à classer mentalement les gens en différents types."}, {"n": 6, "text": "Je trouve cela difficile de lire et de comprendre les cartes."}, {"n": 7, "text": "Quand je regarde une montagne, je pense à la manière précise dont elle s’est formée."}, {"n": 8, "text": "Je ne suis pas intéressé(e) par le détails des taux de change, des taux d’intérêt et des valeurs boursières."}, {"n": 9, "text": "Si j’achetais une voiture, je souhaiterais obtenir des informations spécifiques sur la capacité de son moteur."}, {"n": 10, "text": "Je trouve cela difficile d’apprendre comment on programme un magnétoscope."}, {"n": 11, "text": "Quand j’apprécie quelque chose, j’aime collectionner beaucoup d’exemples différents de chaque type d’objet afin de pouvoir observer ce en quoi ils diffèrent les uns des autres."}, {"n": 12, "text": "Quand j’apprends une langue, je suis intrigué(e) par ses règles grammaticales."}, {"n": 13, "text": "J’aime savoir comment les comités sont structurés : qui les différents membres du comité représentent ou quelles fonctions ils occupent."}, {"n": 14, "text": "Si j’avais une collection (par exemple, de CD, de timbres, de pièces de monnaies, …), elle serait extrêmement organisée."}, {"n": 15, "text": "Je trouve qu’il est difficile de comprendre les manuels d’instructions permettant d’assembler des appareils."}, {"n": 16, "text": "Quand je regarde un bâtiment, je suis curieux(se) de savoir de quelle manière précise il a été construit."}, {"n": 17, "text": "Je ne suis pas intéressé(e) par la compréhension du fonctionnement des réseaux de communication sans fil (ex : téléphonie mobile)."}, {"n": 18, "text": "Quand je voyage en train, je me demande souvent comment le réseau des chemins de fer est précisément coordonné."}, {"n": 19, "text": "J’aime consulter les catalogues de produits afin de voir le détail de chaque produit et de voir comment il se distingue des autres."}, {"n": 20, "text": "Quand il me manque quelque chose à la maison, je l’ajoute toujours à ma liste de courses."}, {"n": 21, "text": "Je sais, avec une précision raisonable, quelle quantité d’argent entre et sort sur/de mon compte en banque ce mois."}, {"n": 22, "text": "Quand j’étais jeune, je ne prenais pas de plaisir à collectionner des séries de choses comme des stickers, des cartes de football, etc"}, {"n": 23, "text": "Je suis intéressé(e) par mon arbre généalogique et par le fait de comprendre comment chaque personne est reliée aux autres au sein de la famille."}, {"n": 24, "text": "Quand j’apprends des événements historiques, je ne me focalise pas sur les dates exactes."}, {"n": 25, "text": "Je trouve qu’il est facile de comprendre exactement comment dans les paris les cotes fonctionnent."}, {"n": 26, "text": "Je ne prends pas de plaisir dans les jeux qui requièrent un haut niveau de stratégie (par exemple les échecs, Risk, …)."}, {"n": 27, "text": "Quand j’apprends une nouvelle catégorie, j’aime aller dans les détails pour comprendre les petites différences entre les membres de cette catégorie."}, {"n": 28, "text": "Je ne trouve pas cela gênant quand quelqu’un qui vit avec moi perturbe mes habitudes."}, {"n": 29, "text": "Quand je regarde un animal, j’aime connaître l’espèce précise à laquelle il appartient."}, {"n": 30, "text": "Je peux me rappeler de grandes quantités d’informations à propos d’un sujet qui m’intéresse (par exemple, les drapeaux nationaux, les logos des compagnies aériennes)."}, {"n": 31, "text": "A la maison, je ne classe pas précautioneusement tous les documents importants (par exemple, les garanties, les polices d’assurance)."}, {"n": 32, "text": "Je suis fasciné(e) par la manière dont les machines fonctionnent."}, {"n": 33, "text": "Quand je regarde un meuble, je ne remarque pas les détails de sa réalisation."}, {"n": 34, "text": "Je connais très peu de choses sur les différentes étapes des procédures législatives de mon pays."}, {"n": 35, "text": "Je n’ai pas tendance à regarder des documentaires scientifiques à la télévision ou à lire des articles portant sur la science et la nature."}, {"n": 36, "text": "Si quelqu’un m’arrêtait pour me demander le chemin, je serais capable de lui indiquer la direction vers n’importe quelle partie de la ville dans laquelle je vis."}, {"n": 37, "text": "Quand je regarde un tableau, je ne pense habituellement pas à la technique employée pour le réaliser."}, {"n": 38, "text": "Je préfère les interactions sociales qui sont organisées autour d’une activité précise (par exemple, un hobby)."}, {"n": 39, "text": "Je ne vérifie pas toujours que mes tickets de frais correspondent à mes relevés de compte bancaire."}, {"n": 40, "text": "Je ne suis pas intéressé(e) par la manière dont le gouvernement est organisé en terme des différents ministères et départements."}, {"n": 41, "text": "Cela m’intéresse de connaître le parcours d’une rivière, de sa source à la mer."}, {"n": 42, "text": "J’ai une vaste collection de livres, CD, vidéos, etc"}, {"n": 43, "text": "S’il y avait un problème avec l’installation électrique de ma maison, je serais capable de le règler moi-même."}, {"n": 44, "text": "Dans ma garde-robe, mes vêtements ne sont pas précautionneusement organisés en fonction de leurs différentes catégories d’appartenance."}, {"n": 45, "text": "Je lis rarement des articles ou des pages web sur des nouvelles technologies."}, {"n": 46, "text": "Je peux facilement visualiser la manière dont les autoroutes de ma région sont reliées les unes aux autres."}, {"n": 47, "text": "Quand une élection a lieu, je ne suis pas intéressé(e) par les résultats de chacun des partis."}, {"n": 48, "text": "Je ne prends pas particulièrement de plaisir à en apprendre sur les faits et les personnages historiques."}, {"n": 49, "text": "Je n’ai pas tendance à me souvenir des dates d’anniversaire des gens (en terme de jour et de mois)."}, {"n": 50, "text": "Quand je me balade à la campagne, je suis curieux(se) de savoir de quelle manière les variétés d’arbres diffèrent."}, {"n": 51, "text": "Je trouve difficile de comprendre les informations que la banque m’envoi sur les différents types d’investissement et sur les systèmes de protection."}, {"n": 52, "text": "Si j’achetais un appareil photo, je ne ferais pas particulièrement attention à la qualité de la lentille."}, {"n": 53, "text": "Si j’achetais un ordinateur, je voudrais connaître les détails exacts des capacités du disque dur et de la vitesse du processeur."}, {"n": 54, "text": "Je ne lis pas les documents légaux très attentivement."}, {"n": 55, "text": "Quand j’arrive à la caisse d’un supermarché, je range les différentes catégories de produits dans des sacs distincts."}, {"n": 56, "text": "Je ne suis pas une méthode particulière quand je nettoie ma maison."}, {"n": 57, "text": "Je ne prends pas de plaisir aux discussions politiques approfondies."}, {"n": 58, "text": "Je ne suis pas très méticuleux(se) lorsque j’effectue des travaux moi-même pour, par exemple, apporter des améliorations à ma maison."}, {"n": 59, "text": "Je ne prendrais pas de plaisir à monter une affaire du début à la fin."}, {"n": 60, "text": "Si j’achetais une chaîne stéréo, je voudrais connaître ses caractéristiques techniques spécifiques."}, {"n": 61, "text": "J’ai tendance à conserver des choses que d’autres pourraient jetter au cas où elles me seraient utiles dans l’avenir."}, {"n": 62, "text": "J’évite les situations que je ne peux pas contrôler."}, {"n": 63, "text": "Cela ne m’intéresse pas de connaître le nom des plantes que je vois."}, {"n": 64, "text": "Quand j’entends les prévisions météo, je ne suis pas très intéressé(e) par les aspects purement météorologiques."}, {"n": 65, "text": "Cela ne m’embête pas si les choses de ma maison ne sont pas à leur pl const TOTAL = Q.reduce((s,q)=>s+q.items.length,0);
const KEY="dpl_draft_v1";
let state={step:0, id:{nom:"",prenom:"",naissance:"",dateJour:""}, ans:{}};
Q.forEach(q=>state.ans[q.id]=new Array(q.items.length).fill(null));

function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function load(){try{const r=localStorage.getItem(KEY);if(r){const s=JSON.parse(r);if(s&&s.ans){return s;}}}catch(e){}return null;}
function clearDraft(){try{localStorage.removeItem(KEY);}catch(e){}}

const app=document.getElementById('app');
const progWrap=document.getElementById('progwrap');
const fill=document.getElementById('fill');
const plab=document.getElementById('plab');

function answeredCount(){let n=0;Q.forEach(q=>state.ans[q.id].forEach(v=>{if(v!==null)n++}));return n;}

function updateProg(){
  if(state.step>=1 && state.step<=Q.length){
    progWrap.classList.remove('hidden');
    const done=answeredCount();
    fill.style.width=(done/TOTAL*100)+'%';
    plab.textContent='Questionnaire '+state.step+'/'+Q.length+' · '+done+'/'+TOTAL+' répondu';
  } else {progWrap.classList.add('hidden');}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(){
  window.scrollTo(0,0);
  if(state.step===0) return renderWelcome();
  if(state.step>=1 && state.step<=Q.length) return renderQ(state.step-1);
  return renderEnd();
}

function renderWelcome(){
  const d=load();
  const resume = d ? '<div class="banner" style="background:var(--accent-soft);border-color:var(--accent);color:var(--accent-d)">Un brouillon a été retrouvé sur cet appareil. <button class="btn ghost no-print" id="resume" style="padding:4px 10px;margin-left:6px">Reprendre</button> <button class="btn ghost" id="fresh" style="padding:4px 10px">Recommencer à zéro</button></div>' : '';
  app.innerHTML = resume + `
  <h1>Questionnaires d'évaluation</h1>
  <p class="sub">Dispositif de Première Ligne — Les Makaras, Unité Mobile Autisme Adulte</p>
  <div class="note">Ces questionnaires aident à mieux comprendre votre fonctionnement au quotidien. Il n'y a ni bonne ni mauvaise réponse. <strong>Aucune limite de temps</strong> : répondez à votre rythme, vous pouvez faire une pause. Vos réponses sont enregistrées sur cet appareil pendant que vous remplissez ; rien n'est envoyé automatiquement.</div>
  <div class="card">
    <h2>Vos informations</h2>
    <p class="muted" style="margin-bottom:18px">Elles permettent à votre médecin d'identifier vos réponses.</p>
    <div class="row2">
      <div class="field"><label for="nom">Nom</label><input id="nom" autocomplete="family-name" value="${esc(state.id.nom)}"></div>
      <div class="field"><label for="prenom">Prénom</label><input id="prenom" autocomplete="given-name" value="${esc(state.id.prenom)}"></div>
    </div>
    <div class="row2">
      <div class="field"><label for="naissance">Date de naissance</label><input id="naissance" type="date" value="${esc(state.id.naissance)}"></div>
      <div class="field"><label for="dateJour">Date du jour</label><input id="dateJour" type="date" value="${esc(state.id.dateJour)}"></div>
    </div>
  </div>
  <p class="muted">4 questionnaires · ${TOTAL} questions au total. Comptez environ 45 minutes.</p>`;
  if(!state.id.dateJour){const t=new Date();const v=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');document.getElementById('dateJour').value=v;state.id.dateJour=v;}
  ['nom','prenom','naissance','dateJour'].forEach(k=>{document.getElementById(k).addEventListener('input',e=>{state.id[k]=e.target.value;save();});});
  if(d){document.getElementById('resume').onclick=()=>{state=d;render();updateProg();};document.getElementById('fresh').onclick=()=>{clearDraft();location.reload();};}
  setNav('', 'Commencer', ()=>{ if(!state.id.nom||!state.id.prenom){showBanner('Veuillez indiquer au moins votre nom et votre prénom.');return;} state.step=1; save(); render(); updateProg(); });
}

function renderQ(qi){
  const q=Q[qi]; const ans=state.ans[q.id];
  let html=`<h2>${esc(q.title)}</h2><p class="sub">${esc(q.subtitle)}</p><div class="note">${esc(q.instruction)}</div><div class="card" id="qlist">`;
  q.items.forEach((it,i)=>{
    html+=`<div class="q" data-i="${i}"><div class="qt"><div class="qn">${it.n}</div><div class="qx">${esc(it.text)}</div></div><div class="opts">`;
    q.opts.forEach((o,oi)=>{
      const sel=ans[i]===oi?' sel':'';
      html+=`<label class="opt${sel}"><input type="radio" name="${q.id}_${i}" value="${oi}"${ans[i]===oi?' checked':''}><span class="dot"></span><span>${esc(o)}</span></label>`;
    });
    html+=`</div></div>`;
  });
  html+=`</div>`;
  app.innerHTML=html;
  app.querySelectorAll('.opt input').forEach(inp=>{
    inp.addEventListener('change',e=>{
      const lbl=e.target.closest('.q'); const i=+lbl.dataset.i;
      ans[i]=+e.target.value;
      lbl.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
      e.target.closest('.opt').classList.add('sel');
      lbl.classList.remove('miss');
      save(); updateProg();
    });
  });
  const isLast=qi===Q.length-1;
  setNav('Précédent', isLast?'Terminer':'Suivant', ()=>{
    const missing=[];ans.forEach((v,i)=>{if(v===null)missing.push(i);});
    if(missing.length){
      app.querySelectorAll('.q').forEach(el=>el.classList.remove('miss'));
      missing.forEach(i=>app.querySelector('.q[data-i="'+i+'"]').classList.add('miss'));
      showBanner('Il reste '+missing.length+' question(s) sans réponse. Elles sont surlignées ci-dessous.');
      const first=app.querySelector('.q.miss'); if(first)first.scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
    state.step++; save(); render(); updateProg();
  }, ()=>{state.step--; save(); render(); updateProg();});
}

function payload(){
  const a={};Q.forEach(q=>a[q.id]=state.ans[q.id]);
  return {v:1, ts:new Date().toISOString(), id:state.id, a};
}
function makeCode(){
  const json=JSON.stringify(payload());
  return 'DPL1:'+btoa(unescape(encodeURIComponent(json)));
}
function safeName(){return (state.id.nom+'_'+state.id.prenom).replace(/[^A-Za-z0-9_\-]/g,'').slice(0,40)||'patient';}

function renderEnd(){
  const code=makeCode();
  app.innerHTML=`
  <h1>C'est terminé, merci.</h1>
  <p>Vos réponses sont complètes. Il reste une seule étape : <strong>les transmettre à votre médecin</strong>.</p>
  <div class="card">
    <h2>Envoyer vos réponses</h2>
    <p>Téléchargez le fichier ci-dessous, puis joignez-le à un e-mail adressé à <a href="mailto:UMAA@ch-valvert.fr">UMAA@ch-valvert.fr</a>.</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin:16px 0">
      <button class="btn" id="dl">Télécharger le fichier</button>
      <button class="btn ghost" id="cp">Copier le code</button>
    </div>
    <p class="muted">Si le téléchargement ne fonctionne pas, copiez le code ci-dessous et collez-le dans votre e-mail :</p>
    <textarea class="code" id="codebox" readonly>${code}</textarea>
  </div>
  <p class="muted">Vos réponses n'ont été envoyées à personne automatiquement : elles partent uniquement quand vous transmettez ce fichier à votre médecin.</p>`;
  document.getElementById('dl').onclick=()=>{
    const blob=new Blob([code],{type:'text/plain'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='DPL_'+safeName()+'_'+state.id.dateJour+'.txt';a.click();
    URL.revokeObjectURL(url); clearDraft();
  };
  document.getElementById('cp').onclick=()=>{const t=document.getElementById('codebox');t.select();
    try{navigator.clipboard.writeText(code);}catch(e){document.execCommand('copy');}
    document.getElementById('cp').textContent='Code copié ✓'; clearDraft();};
  setNav('Précédent','',null,()=>{state.step--;render();updateProg();});
}

let bannerTimer;
function showBanner(msg){
  let b=document.getElementById('banner');
  if(!b){b=document.createElement('div');b.id='banner';b.className='banner';app.prepend(b);}
  b.textContent=msg; window.scrollTo(0,0);
  clearTimeout(bannerTimer);
}
function setNav(prevLabel,nextLabel,onNext,onPrev){
  const nb=document.getElementById('nav');
  nb.innerHTML='';
  const left=document.createElement('div');
  const right=document.createElement('div');
  if(prevLabel){const b=document.createElement('button');b.className='btn ghost';b.textContent=prevLabel;b.onclick=onPrev;left.appendChild(b);}
  if(nextLabel){const b=document.createElement('button');b.className='btn';b.textContent=nextLabel;b.onclick=onNext;right.appendChild(b);}
  nb.appendChild(left);nb.appendChild(right);
}
render();updateProg();
</script>
</body></html>
